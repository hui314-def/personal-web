{% extends "base.html" %}
{% block title %}{{ post.title }} | {{ site_name }}{% endblock %}

{% block content %}
<article class="py-16 bg-white dark:bg-gray-800 min-h-[70vh]">
    <div class="max-w-3xl mx-auto px-4 sm:px-6">
        <!-- 文章头部 -->
        <header class="mb-10">
            <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-3">
                <a href="{{ base_path }}/updates" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i>返回动态
                </a>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 dark:text-white mb-4">
                {{ post.title }}
            </h1>
            <div class="flex flex-wrap items-center gap-3 text-sm text-gray-500 dark:text-gray-400">
                <span class="flex items-center">
                    <i class="far fa-calendar mr-1.5"></i>{{ post.date }}
                </span>
                {% if post.tags %}
                <span class="flex items-center gap-1.5">
                    <i class="fas fa-tags mr-1"></i>
                    {% for t in post.tags %}
                    <a href="{{ base_path }}/updates?tag={{ t }}" class="tag-badge hover:bg-primary-200 dark:hover:bg-primary-800">{{ t }}</a>
                    {% endfor %}
                </span>
                {% endif %}
            </div>
        </header>

        <!-- 文章内容 -->
        <div class="post-content prose max-w-none">
            {{ post.html_content | safe }}
        </div>

        <!-- 文章底部 -->
        <div class="mt-12 pt-8 border-t border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between">
                <a href="{{ base_path }}/updates" class="text-primary-600 dark:text-primary-400 hover:underline flex items-center gap-1">
                    <i class="fas fa-arrow-left"></i> 返回动态列表
                </a>
                <a href="{{ base_path }}/admin" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-sm" title="发布新文章">
                    <i class="fas fa-pen mr-1"></i>写新文章
                </a>
            </div>
        </div>
    </div>
</article>
{% endblock %}
