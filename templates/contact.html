{% extends "base.html" %}
{% block title %}联系我 | {{ site_name }}{% endblock %}

{% block content %}
<section class="py-16 bg-white dark:bg-gray-800">
    <div class="max-w-2xl mx-auto px-4 sm:px-6">
        <h1 class="text-3xl md:text-4xl font-bold text-center mb-4 text-gray-900 dark:text-white">
            <i class="fas fa-envelope text-primary-500 mr-2"></i>联系我
        </h1>
        <p class="text-center text-gray-500 dark:text-gray-400 mb-12">欢迎通过以下方式与我取得联系</p>

        <div class="grid gap-4">
            <!-- 邮箱 -->
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-2xl p-6 flex items-center gap-5 hover:shadow-md transition-shadow">
                <div class="w-14 h-14 rounded-2xl bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-2xl text-red-500 flex-shrink-0">
                    <i class="fas fa-envelope"></i>
                </div>
                <div>
                    <h3 class="text-sm text-gray-500 dark:text-gray-400">QQ邮箱</h3>
                    <a href="mailto:{{ profile.email }}" class="text-lg font-semibold text-gray-900 dark:text-white hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                        {{ profile.email }}
                    </a>
                </div>
                <button onclick="navigator.clipboard.writeText('{{ profile.email }}')" class="ml-auto text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-2" title="复制">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- 电话 -->
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-2xl p-6 flex items-center gap-5 hover:shadow-md transition-shadow">
                <div class="w-14 h-14 rounded-2xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-2xl text-green-500 flex-shrink-0">
                    <i class="fas fa-phone"></i>
                </div>
                <div>
                    <h3 class="text-sm text-gray-500 dark:text-gray-400">电话</h3>
                    <a href="tel:{{ profile.phone }}" class="text-lg font-semibold text-gray-900 dark:text-white hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                        {{ profile.phone }}
                    </a>
                </div>
                <button onclick="navigator.clipboard.writeText('{{ profile.phone }}')" class="ml-auto text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-2" title="复制">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- 微信 -->
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-2xl p-6 flex items-center gap-5 hover:shadow-md transition-shadow">
                <div class="w-14 h-14 rounded-2xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-2xl text-green-500 flex-shrink-0">
                    <i class="fab fa-weixin"></i>
                </div>
                <div>
                    <h3 class="text-sm text-gray-500 dark:text-gray-400">微信</h3>
                    <span class="text-lg font-semibold text-gray-900 dark:text-white">{{ profile.wechat }}</span>
                    <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">（昵称：{{ profile.wechat_nickname }}）</span>
                </div>
                <button onclick="navigator.clipboard.writeText('{{ profile.wechat }}')" class="ml-auto text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-2" title="复制">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- GitHub -->
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-2xl p-6 flex items-center gap-5 hover:shadow-md transition-shadow">
                <div class="w-14 h-14 rounded-2xl bg-gray-800 dark:bg-gray-600 flex items-center justify-center text-2xl text-white flex-shrink-0">
                    <i class="fab fa-github"></i>
                </div>
                <div>
                    <h3 class="text-sm text-gray-500 dark:text-gray-400">GitHub</h3>
                    <a href="{{ profile.github }}" target="_blank" class="text-lg font-semibold text-gray-900 dark:text-white hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                        hui314-def <i class="fas fa-external-link-alt text-xs ml-1"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
